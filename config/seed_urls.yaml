# ==============================================================================
# Heartisans Autonomous Data Pipeline - Seed URL Configuration
# ==============================================================================
# priority: lower number = tried first. Sites are sorted by priority at runtime.
# The spider selects only ceil(target_rows*2/15)+1 seeds — so priority matters.
#
# Tier 1 (priority 10): Confirmed working, high link yield
# Tier 2 (priority 20): Working but lower yield or partial matches
# Tier 3 (priority 30): International luxury — may need browser rendering
# Tier 4 (priority 50): Unreliable / blocks HTTP scrapers
# disabled: Sites that are dead or consistently timeout
# ==============================================================================

