  # ============================================================================

  # NOVICA — 170+ links per page, fallback /p/ selector works perfectly
  - name: "novica_jewelry"
    base_url: "https://www.novica.com/jewelry/"
    category: "artisan_jewelry"
    product_selector: "a[href*='/p/']"
    next_page_selector: "a.next"
    priority: 10
    enabled: true

